<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SynerSeed | From Trust to Multiplication</title>
  <meta name="description" content="SynerSeed connects Taiwan and Japan through business development, tourism, logistics and trust-based partnerships." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <a href="#home" class="brand" aria-label="SynerSeed home">
      <img src="images/logo.png" alt="SynerSeed" />
    </a>
    <nav class="desktop-nav" aria-label="Main navigation">
      <a href="#about" data-i18n="nav.about"></a>
      <a href="#services" data-i18n="nav.services"></a>
      <a href="#cases" data-i18n="nav.cases"></a>
      <a href="#leader" data-i18n="nav.leader"></a>
      <a href="#contact" data-i18n="nav.contact"></a>
    </nav>
    <div class="header-actions">
      <div class="language-switch" aria-label="Language switcher">
        <button type="button" data-lang="zh" class="active">繁中</button>
        <button type="button" data-lang="ja">日本語</button>
        <button type="button" data-lang="en">EN</button>
      </div>
      <a class="header-cta" href="mailto:sandylin@synerseed.com" data-i18n="cta"></a>
    </div>
  </header>

  <main>
    <section id="home" class="hero section-wrap">
      <div class="hero-copy">
        <p class="eyebrow" data-i18n="hero.kicker"></p>
        <h1><span data-i18n="hero.title1"></span><span class="accent" data-i18n="hero.title2"></span></h1>
        <p class="hero-desc" data-i18n="hero.desc"></p>
        <div class="hero-buttons">
          <a class="primary-btn" href="mailto:sandylin@synerseed.com" data-i18n="cta"></a>
          <a class="secondary-btn" href="#cases" data-i18n="hero.caseCta"></a>
        </div>
      </div>
      <aside class="position-card">
        <p class="card-label">SynerSeed Positioning</p>
        <h2 data-i18n="position.title"></h2>
        <div class="pillar-list">
          <article>
            <p class="small-label">About</p>
            <h3 data-i18n="position.trustTitle"></h3>
            <p data-i18n="position.trustDesc"></p>
          </article>
          <article>
            <p class="small-label">Services / Solutions</p>
            <h3 data-i18n="position.executionTitle"></h3>
            <p data-i18n="position.executionDesc"></p>
          </article>
          <article>
            <p class="small-label">Sandy</p>
            <h3 data-i18n="position.partnerTitle"></h3>
            <p data-i18n="position.partnerDesc"></p>
          </article>
        </div>
      </aside>
    </section>

    <section id="about" class="section-wrap split-section">
      <div>
        <p class="section-label">Trust</p>
        <h2 data-i18n="about.title"></h2>
      </div>
      <p class="large-text" data-i18n="about.desc"></p>
    </section>

    <section id="services" class="section-wrap">
      <div class="section-heading">
        <p class="section-label">Execution</p>
        <h2 data-i18n="services.title"></h2>
        <p data-i18n="services.desc"></p>
      </div>

      <div class="execution-grid">
        <article class="execution-card">
          <img src="images/strategy1.png" alt="Strategy service" />
          <div><h3 data-i18n="execution.0.title"></h3><p data-i18n="execution.0.desc"></p></div>
        </article>
        <article class="execution-card">
          <img src="images/strategy2.png" alt="Trust structure design" />
          <div><h3 data-i18n="execution.1.title"></h3><p data-i18n="execution.1.desc"></p></div>
        </article>
        <article class="execution-card">
          <img src="images/strategy3.png" alt="Opportunity discovery" />
          <div><h3 data-i18n="execution.2.title"></h3><p data-i18n="execution.2.desc"></p></div>
        </article>
        <article class="execution-card">
          <img src="images/strategy4.png" alt="Decision support" />
          <div><h3 data-i18n="execution.3.title"></h3><p data-i18n="execution.3.desc"></p></div>
        </article>
      </div>
    </section>

    <section id="cases" class="section-wrap">
      <div class="section-heading">
        <p class="section-label">Case Studies</p>
        <h2 data-i18n="cases.title"></h2>
        <p data-i18n="cases.desc"></p>
      </div>
      <div class="case-grid">
        <article class="case-card">
          <img src="images/logistics.png" alt="Logistics service" />
          <div class="case-body">
            <p class="case-number">Case 01</p>
            <h3 data-i18n="cases.logistics.title"></h3>
            <h4 data-i18n="cases.logistics.subtitle"></h4>
            <p data-i18n="cases.logistics.desc"></p>
          </div>
        </article>
        <article class="case-card">
          <img src="images/rentcar.png" alt="Car rental partnership in Hokkaido" />
          <div class="case-body">
            <p class="case-number">Case 02</p>
            <h3 data-i18n="cases.partner.title"></h3>
            <h4 data-i18n="cases.partner.subtitle"></h4>
            <p data-i18n="cases.partner.desc"></p>
          </div>
        </article>
      </div>
    </section>

    <section id="leader" class="section-wrap leader-section">
      <div class="leader-image">
        <img src="https://sandylind8645ec513-ilzds.wordpress.com/wp-content/uploads/2026/02/chatgpt-image-2026e5b9b42e69c8828e697a5-23_23_05.png" alt="Sandy Lin" />
      </div>
      <div class="leader-copy">
        <p class="section-label">Partnership</p>
        <h2 data-i18n="leader.title"></h2>
        <h3>Sandy Lin</h3>
        <p class="leader-role">CEO / Cross-border Business Partner</p>
        <p data-i18n="leader.desc"></p>
      </div>
    </section>

    <section id="contact" class="section-wrap contact-card">
      <p class="section-label">Contact</p>
      <h2 data-i18n="contact.title"></h2>
      <p data-i18n="contact.desc"></p>
      <a class="primary-btn" href="mailto:sandylin@synerseed.com">sandylin@synerseed.com</a>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
